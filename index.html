
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Examen Wix y Shopify</title>

<style>

body{
font-family:Arial;
background:#eef3fa;
margin:0;
padding:0;
}

.container{
max-width:1100px;
margin:20px auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,0.2);
}

h1,h2,h3{
text-align:center;
color:#163d7a;
}

button{
padding:10px 15px;
background:#163d7a;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
margin:5px;
font-weight:bold;
}

button:hover{
background:#102a56;
}

.logout{
background:#c62828;
float:right;
}

.logout:hover{
background:#8e0000;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
}

.card{
background:#f3f6ff;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

.question{
background:#eef2ff;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

.hidden{
display:none;
}

.result{
font-size:24px;
font-weight:bold;
color:green;
text-align:center;
}

.timer{
font-size:22px;
font-weight:bold;
color:red;
text-align:center;
margin-bottom:20px;
}

</style>

</head>
<body>

<div class="container">

<h1>Examen Interactivo - Wix y Shopify</h1>

<div id="home">

<center>

<button onclick="showProfessor()">Profesor</button>

<button onclick="showStudent()">Alumno</button>

</center>

</div>

<div id="professorLogin" class="hidden">

<h2>Login Profesor</h2>

<input type="text" id="profUser" placeholder="Usuario">

<input type="password" id="profPass" placeholder="Clave">

<button onclick="loginProfessor()">Ingresar</button>

<button onclick="goHome()">Volver</button>

</div>

<div id="professorPanel" class="hidden">

<button class="logout" onclick="logout()">Salir</button>

<h2>Panel del Profesor</h2>

<div class="card">

<h3>Registrar Alumno</h3>

<input type="text" id="studentName" placeholder="Usuario alumno">

<input type="password" id="studentPassword" placeholder="Clave alumno">

<button onclick="registerStudent()">Registrar Alumno</button>

</div>

<div class="card">

<h3>Alumnos Registrados</h3>

<div id="studentList"></div>

</div>

<div class="card">

<h3>Resultados y Calificaciones</h3>

<div id="results"></div>

</div>

</div>

<div id="studentLogin" class="hidden">

<h2>Login Alumno</h2>

<input type="text" id="studentUserLogin" placeholder="Usuario">

<input type="password" id="studentPassLogin" placeholder="Clave">

<button onclick="studentLogin()">Ingresar</button>

<button onclick="goHome()">Volver</button>

</div>

<div id="examSection" class="hidden">

<h2>Examen</h2>

<div class="timer" id="timer">15:00</div>

<div id="studentExamName"></div>

<form id="examForm"></form>

<center>

<button onclick="submitExam()">Finalizar Examen</button>

<button class="logout" onclick="studentExit()">Salir</button>

</center>

</div>

<div id="finalResult" class="hidden">

<div class="result" id="scoreText"></div>

<center>

<button onclick="goHome()">Volver al Inicio</button>

</center>

</div>

</div>

<script>

const professorUser = "profesor";
const professorPass = "profesor123";

let students = JSON.parse(localStorage.getItem("students")) || [];
let results = JSON.parse(localStorage.getItem("results")) || [];

const questionBank = [

{
q:"¿Qué plataforma es ideal para crear sitios web sin programar?",
options:["Wix","Oracle","Excel","Linux"],
answer:"Wix"
},

{
q:"¿Qué plataforma está enfocada en comercio electrónico?",
options:["Shopify","Paint","Word","Discord"],
answer:"Shopify"
},

{
q:"¿Qué plataforma tiene editor drag and drop?",
options:["Wix","Java","C++","Teams"],
answer:"Wix"
},

{
q:"¿Qué plataforma sirve para vender productos online?",
options:["Shopify","TikTok","Facebook","Netflix"],
answer:"Shopify"
},

{
q:"¿Qué plataforma usa plantillas visuales?",
options:["Wix","Android","iOS","Windows"],
answer:"Wix"
},

{
q:"¿Qué plataforma tiene herramientas de pago integradas?",
options:["Shopify","Chrome","Spotify","Steam"],
answer:"Shopify"
},

{
q:"¿Qué plataforma es buena para páginas personales?",
options:["Wix","Photoshop","Python","Zoom"],
answer:"Wix"
},

{
q:"¿Qué plataforma administra inventario y ventas?",
options:["Shopify","PowerPoint","Excel","WhatsApp"],
answer:"Shopify"
}

];

function hideAll(){

document.getElementById("home").classList.add("hidden");
document.getElementById("professorLogin").classList.add("hidden");
document.getElementById("professorPanel").classList.add("hidden");
document.getElementById("studentLogin").classList.add("hidden");
document.getElementById("examSection").classList.add("hidden");
document.getElementById("finalResult").classList.add("hidden");

}

function goHome(){

hideAll();

document.getElementById("home").classList.remove("hidden");

}

function showProfessor(){

hideAll();

document.getElementById("professorLogin").classList.remove("hidden");

}

function showStudent(){

hideAll();

document.getElementById("studentLogin").classList.remove("hidden");

}

function logout(){

goHome();

}

function loginProfessor(){

const user = document.getElementById("profUser").value;
const pass = document.getElementById("profPass").value;

if(user === professorUser && pass === professorPass){

hideAll();

document.getElementById("professorPanel").classList.remove("hidden");

renderStudents();

renderResults();

}else{

alert("Credenciales incorrectas");

}

}

function registerStudent(){

const user = document.getElementById("studentName").value.trim();
const password = document.getElementById("studentPassword").value.trim();

if(students.length >= 4){

alert("Máximo 4 alumnos.");

return;

}

if(user === "" || password === ""){

alert("Complete todos los campos.");

return;

}

const exists = students.find(s => s.user === user);

if(exists){

alert("Alumno ya registrado.");

return;

}

students.push({
user:user,
password:password
});

localStorage.setItem("students", JSON.stringify(students));

document.getElementById("studentName").value = "";
document.getElementById("studentPassword").value = "";

renderStudents();

alert("Alumno registrado.");

}

function renderStudents(){

const div = document.getElementById("studentList");

if(students.length === 0){

div.innerHTML = "No hay alumnos.";

return;

}

div.innerHTML = "";

students.forEach(s=>{

div.innerHTML += `
<div class="card">
<b>Usuario:</b> ${s.user}<br>
<b>Clave:</b> ${s.password}
</div>
`;

});

}

function renderResults(){

const div = document.getElementById("results");

if(results.length === 0){

div.innerHTML = "No existen resultados.";

return;

}

div.innerHTML = "";

results.forEach((r,index)=>{

div.innerHTML += `
<div class="card">
<b>Alumno:</b> ${r.student}<br>
<b>Correctas:</b> ${r.correct}<br>
<b>Nota:</b> ${r.score}/10<br><br>

<button onclick="gradeStudent(${index})">
Calificar Respuestas
</button>

</div>
`;

});

}

function gradeStudent(index){

alert(
"Alumno: " + results[index].student +
"\nCorrectas: " + results[index].correct +
"\nNota Final: " + results[index].score + "/10"
);

}

let currentStudent = "";
let currentQuestions = [];

function shuffle(array){

return array.sort(()=>Math.random()-0.5);

}

function studentLogin(){

const user = document.getElementById("studentUserLogin").value;
const pass = document.getElementById("studentPassLogin").value;

const student = students.find(s => s.user === user && s.password === pass);

if(!student){

alert("Usuario o clave incorrecta.");

return;

}

currentStudent = student.user;

startExam();

}

let timeLeft = 900;
let timerInterval;

function startTimer(){

clearInterval(timerInterval);

timeLeft = 900;

timerInterval = setInterval(()=>{

let minutes = Math.floor(timeLeft / 60);
let seconds = timeLeft % 60;

if(seconds < 10){
seconds = "0" + seconds;
}

document.getElementById("timer").innerHTML =
minutes + ":" + seconds;

timeLeft--;

if(timeLeft < 0){

clearInterval(timerInterval);

alert("Tiempo terminado.");

submitExam();

}

},1000);

}

function startExam(){

hideAll();

document.getElementById("examSection").classList.remove("hidden");

document.getElementById("studentExamName").innerHTML =
"<h3>Alumno: " + currentStudent + "</h3>";

currentQuestions = shuffle([...questionBank]).slice(0,5);

const form = document.getElementById("examForm");

form.innerHTML = "";

currentQuestions.forEach((q,index)=>{

let html = `
<div class="question">
<h3>${index+1}. ${q.q}</h3>
`;

shuffle([...q.options]).forEach(opt=>{

html += `
<label>
<input type="radio" name="q${index}" value="${opt}">
${opt}
</label><br><br>
`;

});

html += "</div>";

form.innerHTML += html;

});

startTimer();

}

function submitExam(){

clearInterval(timerInterval);

let correct = 0;

currentQuestions.forEach((q,index)=>{

const ans = document.querySelector(`input[name="q${index}"]:checked`);

if(ans && ans.value === q.answer){

correct++;

}

});

const score = ((correct/5)*10).toFixed(1);

results.push({
student:currentStudent,
correct:correct,
score:score
});

localStorage.setItem("results", JSON.stringify(results));

hideAll();

document.getElementById("finalResult").classList.remove("hidden");

document.getElementById("scoreText").innerHTML =
currentStudent + ", tu nota es: " + score + "/10";

}

function studentExit(){

clearInterval(timerInterval);

alert("Sesión finalizada.");

goHome();

}

</script>

</body>
</html>
